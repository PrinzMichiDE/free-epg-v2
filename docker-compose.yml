services:
  db-init:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://freeepg:freeepg@postgres:5432/freeepg
      SEED_ON_START: "false"
    command: ["node", "packages/db/dist/docker-migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - freeepg-internal

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://freeepg:freeepg@postgres:5432/freeepg
      REDIS_URL: redis://redis:6379
      EPG_DATA_DIR: /data/epg
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@free-epg.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ANALYTICS_ENABLED: ${ANALYTICS_ENABLED:-true}
      SEED_ON_START: ${SEED_ON_START:-true}
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://freeepg:freeepg@postgres:5432/freeepg
      REDIS_URL: redis://redis:6379
      EPG_DATA_DIR: /data/epg
      FETCH_ON_START: ${FETCH_ON_START:-true}
      SEED_ON_START: ${SEED_ON_START:-true}
      CRON_COUNTRY_FETCH: ${CRON_COUNTRY_FETCH:-0 */6 * * *}
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freeepg-internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freeepg
      POSTGRES_PASSWORD: freeepg
      POSTGRES_DB: freeepg
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeepg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  epg-data:

networks:
  freeepg-internal:
    driver: bridge
