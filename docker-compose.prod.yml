# Production stack — requires stack.env for compose interpolation and service env:
#   docker compose --env-file stack.env -f docker-compose.prod.yml up -d

services:
  db-init:
    image: ${DOCKERHUB_USER:-freeepg}/freeepg-worker:${IMAGE_TAG:-latest}
    env_file:
      - stack.env
    command: ["node", "packages/db/dist/docker-init.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - freeepg-internal

  web:
    image: ${DOCKERHUB_USER:-freeepg}/freeepg-web:${IMAGE_TAG:-latest}
    env_file:
      - stack.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freeepg.rule=Host(`free-epg.de`) || Host(`www.free-epg.de`)"
      - "traefik.http.routers.freeepg.entrypoints=websecure"
      - "traefik.http.routers.freeepg.tls.certresolver=myresolver"
      - "traefik.http.services.freeepg.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy-public"
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxy-public
      - freeepg-internal

  worker:
    image: ${DOCKERHUB_USER:-freeepg}/freeepg-worker:${IMAGE_TAG:-latest}
    env_file:
      - stack.env
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freeepg-internal

  postgres:
    image: postgres:16-alpine
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: freeepg
      POSTGRES_DB: freeepg
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeepg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  epg-data:

networks:
  proxy-public:
    external: true
  freeepg-internal:
    internal: true
