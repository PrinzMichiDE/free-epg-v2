# Production stack — requires stack.env for compose interpolation and service env:
#   docker compose --env-file stack.env -f docker-compose.prod.yml up -d

services:
  db-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./packages/db/drizzle/0000_init.sql:/init.sql:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "[db-init] waiting for postgres..."
        until pg_isready -h postgres -p 5432 -U freeepg; do sleep 2; done
        echo "[db-init] applying schema..."
        psql -h postgres -U freeepg -d freeepg -v ON_ERROR_STOP=1 -f /init.sql
        echo "[db-init] schema ready"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - freeepg-internal

  db-seed:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - stack.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - .:/app
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache postgresql-client >/dev/null
        chmod +x ./scripts/db-seed.sh
        exec ./scripts/db-seed.sh
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - freeepg-internal

  web:
    image: ${DOCKERHUB_USER:-freeepg}/freeepg-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EPG_DATA_DIR: ${EPG_DATA_DIR:-/data/epg}
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://free-epg.de}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.freeepg.rule=Host(`free-epg.de`) || Host(`www.free-epg.de`)"
      - "traefik.http.routers.freeepg.entrypoints=websecure"
      - "traefik.http.routers.freeepg.tls.certresolver=myresolver"
      - "traefik.http.services.freeepg.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy-public"
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - proxy-public
      - freeepg-internal

  worker:
    image: ${DOCKERHUB_USER:-freeepg}/freeepg-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - stack.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      EPG_DATA_DIR: ${EPG_DATA_DIR:-/data/epg}
      SEED_ON_START: ${SEED_ON_START:-true}
      FETCH_ON_START: ${FETCH_ON_START:-true}
    volumes:
      - epg-data:/data/epg
    depends_on:
      db-seed:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freeepg-internal

  postgres:
    image: postgres:16-alpine
    env_file:
      - stack.env
    environment:
      POSTGRES_USER: freeepg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: freeepg
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeepg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    networks:
      - freeepg-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  epg-data:

networks:
  proxy-public:
    external: true
  freeepg-internal:
    driver: bridge
